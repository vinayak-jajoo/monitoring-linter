# CPU Monitoring
define service {
    use                     generic-service
    host_name               localhost
    service_description     CPU Load
    check_command           check_cpu!80!90
    check_interval          1
    retry_interval          0.5
    max_check_attempts      3
    notification_interval   30
    notification_options    w,c,r
}

